<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track My Reports – Fix My Ward</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="bg-slate-950 text-slate-50 min-h-screen flex flex-col">

   <!-- Loading Screen -->
  <div id="app-loader" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
    <img
      src="../assets/images/logo.png"
      alt="Fix My Ward Logo"
      class="loader-logo w-24 h-24"
    />
  </div>

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur">
    <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">

      <!-- Back Button -->
    <button
      onclick="history.back()"
      class="flex items-center gap-1 text-slate-300 hover:text-emerald-400
         text-sm font-medium transition">← Back</button>

      <div class="flex items-center gap-2">
        <img
        src="../assets/images/logo.png"
        alt="Fix My Ward"
        class="h-8 w-8 rounded-lg shadow-md"
        />
          <div>
            <p class="text-xs text-slate-400">Fix My Ward</p>
            <h1 class="text-sm font-semibold">My Reports</h1>
          </div>
      </div>

      <div id="citizen-badge" class="hidden text-right">
        <p id="citizen-name-display" class="text-xs text-emerald-300 font-semibold"></p>
        <p id="citizen-email-display" class="text-[10px] text-slate-400"></p>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-3xl mx-auto px-4 py-5 space-y-4">

    <!-- Greeting -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-4">
      <p id="greeting-text" class="text-sm font-medium"></p>
      <p class="text-xs text-slate-400">
        Track your submitted civic issues and download reports.
      </p>
    </div>

    <!-- Filter -->
    <div class="flex justify-between items-center bg-slate-900 border border-slate-800 rounded-xl p-3">
      <p class="text-[11px] text-slate-400">
        <span id="issue-count">0</span> issue(s)
      </p>
      <select
        id="filter-status"
        class="bg-slate-950 border border-slate-700 text-[11px] rounded-lg px-2 py-1">
        <option value="all">All statuses</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
      </select>
    </div>

    <!-- Issues -->
    <div id="issues-list" class="space-y-3"></div>

    <!-- Empty -->
    <div id="no-issues" class="hidden text-center text-sm text-slate-400">
      No issues reported yet.
    </div>
  </main>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- JS -->
  <script src="../assets/js/track.js"></script>
  <script src="../assets/js/loader.js"></script>

</body>
</html>
