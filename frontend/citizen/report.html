<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Report an Issue – Fix My Ward</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body class="bg-slate-950 text-slate-50 min-h-screen flex flex-col">

<!-- HEADER -->
<header class="w-full border-b border-slate-800 bg-slate-950/80 backdrop-blur">
<div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">

<button onclick="history.back()" class="text-slate-300 hover:text-emerald-400 text-sm">
<b>← Back</b>
</button>

<div class="flex items-center gap-2">
<img src="../assets/images/logo.png" class="h-8 w-8 rounded-lg shadow-md"/>
<div>
<p class="text-xs text-slate-400">Fix My Ward</p>
<h1 class="text-sm font-semibold">Report an Issue</h1>
</div>
</div>

<div id="citizen-badge" class="hidden sm:flex flex-col items-end text-right">
<p id="citizen-name-display" class="text-xs font-semibold text-emerald-300"></p>
<p id="citizen-email-display" class="text-[10px] text-slate-400"></p>
</div>

</div>
</header>


<!-- MAIN -->
<main class="flex-1">
<section class="max-w-3xl mx-auto px-4 py-5 space-y-4">

<!-- Greeting -->
<div class="bg-slate-900/70 border border-slate-800 rounded-2xl p-4 flex items-start gap-3">
<div class="mt-1 text-lg">👋</div>
<div>
<p id="greeting-text" class="text-sm font-medium mb-1">Hello citizen!</p>
<p class="text-xs text-slate-300">
Tell us what’s wrong in your area. A clear photo and accurate location help resolve it faster.
</p>
</div>
</div>


<!-- FORM -->
<form id="issue-form" class="space-y-4 bg-slate-900/70 border border-slate-800 rounded-2xl p-4">

<!-- TITLE -->
<div>
<label class="text-xs text-slate-300">Issue Title</label>
<input id="issue-title" type="text"
class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-700 text-sm"
placeholder="e.g. Large pothole near bus stop" required>
</div>

<!-- CATEGORY -->
<div>
<label class="text-xs text-slate-300">Category</label>
<div id="selected-category-display"
class="px-3 py-2 rounded-lg bg-slate-950 border border-emerald-500 text-sm text-emerald-400 font-medium"></div>
</div>

<!-- DESCRIPTION -->
<div>
<label class="text-xs text-slate-300">Description</label>
<textarea id="issue-description" rows="3"
class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-700 text-sm"
placeholder="Describe the issue"></textarea>
</div>


<!-- LOCATION -->
<div class="space-y-2">

<div class="flex justify-between">
<label class="text-xs text-slate-300">Location</label>

<div class="flex gap-2">

<button type="button" id="btn-use-location"
class="px-2 py-1 text-xs bg-emerald-500/10 border border-emerald-500/40 rounded-lg">
📍 Use my location
</button>

<button type="button" id="btn-fullscreen-map"
class="px-2 py-1 text-xs bg-slate-800 border border-slate-700 rounded-lg">
⤢ Fullscreen
</button>

</div>
</div>

<input id="issue-location-text"
class="w-full px-3 py-2 rounded-lg bg-slate-950 border border-slate-700 text-sm"
placeholder="Landmark or address">

<div class="grid grid-cols-2 gap-2">
<input id="issue-lat" class="px-2 py-2 rounded bg-slate-950 border border-slate-700 text-xs" readonly placeholder="Latitude">
<input id="issue-lng" class="px-2 py-2 rounded bg-slate-950 border border-slate-700 text-xs" readonly placeholder="Longitude">
</div>

<div id="issue-map" class="h-52 border border-slate-800 rounded-xl"></div>

</div>


<!-- PHOTO -->
<div>
<label class="text-xs text-slate-300">Photos (max 4)</label>

<label for="issue-photo"
class="block border border-dashed border-slate-700 rounded-xl p-4 text-center cursor-pointer">

📸 Upload Photos

</label>

<input id="issue-photo" type="file" multiple accept="image/*" class="hidden">

<div id="photo-preview" class="grid grid-cols-4 gap-2 mt-2"></div>

</div>


<!-- SUBMIT -->
<button type="submit"
class="w-full bg-emerald-500 text-slate-900 py-2 rounded-xl font-semibold">
🚀 Submit Issue
</button>

</form>

</section>
</main>


<!-- DUPLICATE ISSUE MODAL -->
<div id="duplicate-modal"
class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70">

<div class="bg-slate-900 border border-slate-800 rounded-xl p-6 w-[90%] max-w-md">

<h3 class="text-lg font-semibold mb-2 text-emerald-400">
Similar Issue Detected
</h3>

<p class="text-sm text-slate-300 mb-4">
A similar issue was already reported nearby.
Would you like to support that report instead?
</p>

<div class="flex gap-3">

<button id="btn-upvote-existing"
class="flex-1 bg-emerald-500 text-slate-900 py-2 rounded-lg text-sm font-semibold">
👍 Upvote Existing Issue
</button>

<button id="btn-continue-report"
class="flex-1 bg-slate-800 border border-slate-700 py-2 rounded-lg text-sm">
Submit My Own
</button>

</div>

</div>
</div>


<!-- FULLSCREEN MAP -->
<div id="map-fullscreen-overlay"
class="hidden fixed inset-0 z-50 bg-slate-950">

<button id="btn-close-fullscreen"
class="absolute top-3 right-3 bg-slate-900 border border-slate-700 px-3 py-1 rounded-lg">
✕ Close
</button>

<div id="issue-map-fullscreen" class="w-full h-full"></div>

</div>


<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="../assets/js/map.js"></script>
<script src="../assets/js/citizen.js"></script>
<script src="../assets/js/loader.js"></script>

</body>
</html>
