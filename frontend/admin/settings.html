<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-64 bg-indigo-700 text-white flex flex-col">
    <div class="p-5 font-bold">Fix My Ward</div>

    <nav class="flex-1 p-4 space-y-2">
      <a href="dashboard.html" class="block p-2 hover:bg-indigo-600 rounded">Dashboard</a>
      <a href="issues.html" class="block p-2 hover:bg-indigo-600 rounded">Issues</a>
      <a href="analytics.html" class="block p-2 hover:bg-indigo-600 rounded">Analytics</a>
      <a href="settings.html" class="block p-2 bg-indigo-600 rounded">Settings</a>
    </nav>

    <div class="p-4 border-t border-indigo-500">
      <button onclick="logout()" class="w-full bg-red-500 p-2 rounded">
        Logout
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-6">

    <h1 class="text-2xl font-bold mb-6">Settings</h1>

    <div class="grid md:grid-cols-2 gap-6">

      <!-- ADMIN INFO -->
      <div class="bg-white p-4 rounded shadow">
        <h2 class="font-semibold mb-3">Admin Info</h2>

        <label class="block mb-2 text-sm">Username</label>
        <input type="text" value="admin"
          class="w-full border p-2 rounded mb-3" disabled>

        <label class="block mb-2 text-sm">Role</label>
        <input type="text" value="Administrator"
          class="w-full border p-2 rounded" disabled>
      </div>

      <!-- PASSWORD CHANGE -->
      <div class="bg-white p-4 rounded shadow">
        <h2 class="font-semibold mb-3">Change Password</h2>

        <input type="password" id="newPassword"
          placeholder="New Password"
          class="w-full border p-2 rounded mb-3">

        <button onclick="changePassword()"
          class="bg-indigo-600 text-white px-4 py-2 rounded">
          Update Password
        </button>
      </div>

    </div>

  </div>

</div>

<script src="../assets/js/admin.js"></script>

<!-- TOAST -->
<div id="toast"
  class="hidden fixed top-5 right-5 px-4 py-2 rounded shadow-lg text-white z-50">
</div>

<!-- LOADER -->
<div id="loader"
  class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
  <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
</div>

</body>
</html>
