<!DOCTYPE html>
<html>
<head>
  <title>Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-indigo-700 text-white flex flex-col">
    <div class="p-5 font-bold">Fix My Ward</div>

    <nav class="flex-1 p-4 space-y-2">

  <a href="dashboard.html" class="block p-2 rounded hover:bg-indigo-600">
    Dashboard
  </a>

  <a href="issues.html" class="block p-2 rounded hover:bg-indigo-600">
    Issues
  </a>

  <a href="analytics.html" class="block p-2 rounded bg-indigo-600">
    Analytics
  </a>

  <a href="settings.html" class="block p-2 rounded bg-indigo-600">
    Settings
  </a>

</nav>
  </div>

  <!-- Content -->
  <div class="p-6">

  <h1 class="text-2xl font-bold mb-6">Analytics</h1>

  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-white p-4 rounded shadow">
      <h2 class="mb-2 font-semibold">Issues by Status</h2>
      <canvas id="statusChart"></canvas>
    </div>

    <div class="bg-white p-4 rounded shadow">
      <h2 class="mb-2 font-semibold">Issues by Category</h2>
      <canvas id="categoryChart"></canvas>
    </div>

  </div>

</div>
</div>

<script src="../assets/js/admin.js"></script>

<!-- TOAST -->
<div id="toast"
  class="hidden fixed top-5 right-5 bg-gray-800 text-white px-4 py-2 rounded shadow-lg z-50">
</div>

<!-- LOADER -->
<div id="loader"
  class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
  <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
</div>

</body>
</html>
